<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Styled Form</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --accent:#4f46e5;
      --muted:#6b7280;
      --success:#10b981;
      --radius:12px;
      --shadow: 0 6px 18px rgba(15,23,42,0.08);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,body{
      height:100%;
      margin:0;
      background:linear-gradient(180deg, var(--bg), #eef2ff 60%);
      color:#0f172a;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 16px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px;
      box-sizing:border-box;
      border:1px solid rgba(15,23,42,0.04);
    }

    .title{
      margin:0 0 8px 0;
      font-size:20px;
      font-weight:600;
      letter-spacing:-0.2px;
    }

    .desc{
      margin:0 0 18px 0;
      color:var(--muted);
      font-size:13px;
    }

    label{
      display:block;
      font-size:13px;
      margin-bottom:8px;
      color:#0f172a;
      font-weight:500;
    }

    .field{
      display:flex;
      gap:8px;
      align-items:center;
    }

    input[type="email"]{
      flex:1;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(15,23,42,0.08);
      background:#fff;
      font-size:14px;
      outline:none;
      transition:box-shadow .15s, border-color .15s, transform .06s;
    }

    input[type="email"]:focus{
      border-color:var(--accent);
      box-shadow:0 6px 18px rgba(79,70,229,0.12);
      transform:translateY(-1px);
    }

    .btn{
      margin-top:16px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      background:var(--accent);
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:600;
      cursor:pointer;
      font-size:14px;
      transition:transform .12s, box-shadow .12s, opacity .12s;
    }

    .btn:active{ transform:translateY(1px); }
    .btn:disabled{ opacity:0.6; cursor:not-allowed; }

    .note{
      margin-top:12px;
      font-size:13px;
      color:var(--muted);
    }

    .message{
      margin-top:12px;
      font-size:13px;
      font-weight:600;
      color:var(--success);
    }

    @media (max-width:420px){
      .card{ padding:20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <form id="simpleForm" class="card" novalidate>
      <h3 class="title">Subscribe to updates</h3>
      <p class="desc">Enter your email and we will send occasional product updates.</p>

      <div>
        <label for="email">Email address</label>
        <div class="field">
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
            aria-describedby="emailHelp"
          />
        </div>
        <p id="emailHelp" class="note">We will never share your email.</p>
      </div>

      <button type="submit" class="btn" id="submitBtn">Subscribe</button>

      <div id="feedback" role="status" aria-live="polite"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('simpleForm');
    const email = document.getElementById('email');
    const feedback = document.getElementById('feedback');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      feedback.textContent = '';
      if (!email.checkValidity()) {
        email.reportValidity();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      // Simulate sending data to a server
      setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Subscribe';
        feedback.className = 'message';
        feedback.textContent = 'Thanks — you are subscribed!';
        form.reset();
      }, 900);
    });
  </script>
</body>
</html>
